[pytest]
# 测试路径
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记
markers =
    smoke: 冒烟测试
    regression: 回归测试
    full: 全量测试
    ios: iOS 专用测试
    android: Android 专用测试
    slow: 慢速测试

# 命令行选项
addopts =
    -v
    --tb=short
    -rs
    --alluredir=./reports/allure-results

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 失败重跑
reruns = 1
reruns_delay = 2

# 并行执行（可选）
# numprocesses = 2

# 忽略警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
